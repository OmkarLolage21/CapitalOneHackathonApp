name: capital_one_agri_advisor
description: Agentic AI advisor for Agriculture powered by n8n and Flutter
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State & DI
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.7

  # HTTP & Realtime
  dio: ^5.6.0
  dio_smart_retry: ^5.0.0
  pretty_dio_logger: ^1.3.1
  web_socket_channel: ^3.0.0

  # Storage & Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.4
  shared_preferences: ^2.3.2

  # Device
  geolocator: ^13.0.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.1

  # Voice & Media
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2
  image_picker: ^1.1.2
  file_picker: ^8.1.3

  # UI & Charts & Maps
  fl_chart: ^0.69.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Notifications (local)
  flutter_local_notifications: ^17.2.3

  # Design & Motion (new)
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Firebase
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.2

  # Chat UI & Utilities
  dash_chat_2: ^0.0.21
  flutter_markdown: ^0.7.4+9
  intl_phone_field: ^3.2.0
  qr_flutter: ^4.1.0
  html: ^0.15.4
  logger: ^2.3.0

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_gen_runner: ^5.7.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
